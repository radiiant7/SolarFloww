<!DOCTYPE html>
<html>
<head>
  <title>SolarFloww</title>
  <link rel="icon" type="image/png" href="sun.png">
</head>

  <!-- Modern font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    /* Popup background */
    #coffee-popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease, background 0.5s ease;
      z-index: 9999;
    }

    #coffee-popup.show {
      opacity: 1;
      pointer-events: auto;
    }

    /* Popup box */
    #coffee-box {
      background: #111;
      color: white;
      padding: 25px;
      border-radius: 12px;
      text-align: center;
      width: 300px;

      position: fixed;
      top: 50%;
      left: 50%;

      /* Start centered */
      transform: translate(-50%, -50%) scale(1);

      /* Smooth slower animation */
      transition: transform 1.2s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* Controlled glide to bottom-left */
    #coffee-box.fly {
  	transform: translate(calc(-56.7vw + 20px), calc(-33vh - 20px)) scale(0.4);
}
    }

    #coffee-box h2 {
      font-weight: 600;
      margin-bottom: 10px;
    }

    #coffee-box p {
      font-weight: 400;
      opacity: 0.8;
      margin: 0;
    }

    /* Button */
    #coffee-btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 15px;
      background: #ff4000;
      color: black;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
    }

    #coffee-btn:hover {
      background: #ff3800;
    }
  </style>
</head>

<body>


  <iframe src="app.html" style="width:100vw;height:100vh;border:none;"></iframe>

  <!-- POPUP -->
  <div id="coffee-popup">
    <div id="coffee-box">
      <h2>Enjoying SolarFloww?</h2>
      <p>If you like this tool, consider supporting it ☀️</p>
      <a href="https://ko-fi.com/radiant7#payment-widget" target="_blank" id="coffee-btn">
        Support me on ko-fi!
      </a>
    </div>
  </div>

  <script>

const popup = document.getElementById("coffee-popup");
const box = document.getElementById("coffee-box");

// Show after 45 seconds
setTimeout(() => {
  popup.style.pointerEvents = "auto"; // ENABLE clicks
  popup.classList.add("show");
}, 45000);

function flyAway() {
  box.classList.add("fly");

  // Fade background
  popup.style.background = "rgba(0,0,0,0)";

  // After animation → disable only background, NOT the box
  setTimeout(() => {
    popup.style.pointerEvents = "none";   // background stops blocking
    box.style.pointerEvents = "auto";     // box stays clickable
  }, 1200);
}

// ANY click triggers fly
popup.onclick = function() {
  flyAway();
};

  </script>

</body>
</html>
